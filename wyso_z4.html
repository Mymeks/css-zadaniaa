}

<body>

<h2>Sposoby podłączania CSS do strony WWW</h2>

<table>
<tr>
<td>
1. Styl liniowy

<textarea readonly>
<p style="color:red;">Tekst</p>
</textarea>

Styl wpisany w znaczniku HTML.
</td>
</tr>
</table>

<table>
<tr>
<td>
2. Styl wewnętrzny

<textarea readonly>
<style>
p { color: blue; }
</style>
</textarea>

Style w sekcji head.
</td>
</tr>
</table>

<table>
<tr>
<td>
3. Zewnętrzny arkusz CSS

</textarea>

</td>
</tr>
</table>

<table>
<tr>
<td>
4. Import CSS

<textarea readonly>
<style>
@import url("style.css");
</style>
</textarea>

Importowanie stylów.
</td>
</tr>
</table>

<table>
<tr>
<td>

Przeglądarka sama nadaje styl
np. nagłówkom i paragrafom.

</td>
</tr>
</table>
